services:
  app:
    build: .
    image: glacianav-demo:latest
    container_name: glacianav-demo
    restart: unless-stopped
    expose:
      - "3000"
    # Loopback-only, for smoke-testing on the host. Safe to remove.
    ports:
      - "127.0.0.1:3311:3000"
    networks:
      - demo

  # Only for publishing the demo on its OWN hostname via its OWN tunnel.
  # Not used when an existing tunnel routes glacianav.com/demo — see
  # docker-compose.tunnel.yml and the README.
  cloudflared:
    profiles:
      - standalone
    image: cloudflare/cloudflared:latest
    container_name: glacianav-demo-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Only needed for the standalone profile; cloudflared exits with a
      # clear error if it is empty.
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - app
    networks:
      - demo

networks:
  demo:
    driver: bridge
